# mutual_fm.yaml ‚Äî two Oscillators applying logarithmic FM to each other
#
# Signal flow:
#
#   sine1 ‚îÄ‚îÄsine‚îÄ‚îÄ‚Üí sine2.fm (scale 0.2)
#   sine2 ‚îÄ‚îÄsine‚îÄ‚îÄ‚Üí sine1.fm (scale 0.2)
#   sine1 ‚îÄ‚îÄsine‚îÄ‚îÄ‚Üí mix.in/0  (scale 0.5)
#   sine2 ‚îÄ‚îÄsine‚îÄ‚îÄ‚Üí mix.in/1  (scale 0.5)
#   mix ‚îÄ‚îÄout‚îÄ‚îÄ‚Üí out.left + out.right

nodes:
  
  sine1:
    module: Oscillator
    params:
      frequency: 117.0
      fm_type: logarithmic

  sine2:
    module: Oscillator
    params:
      frequency: 118.0
      fm_type: logarithmic
      
  mix:
    module: Sum
    channels: 2

  mix2:
    module: Sum
    channels: 2

  out:
    module: AudioOut

cables:
  - from: sine1
    output: triangle
    to: sine2
    input: phase_mod
    scale: 0.1

  - from: sine2
    output: sine
    to: sine1
    input: phase_mod
    scale: 0.1

  - from: sine1
    output: triangle
    to: mix
    input: in/0
    scale: 0.5

  - from: sine2
    output: triangle
    to: mix
    input: in/1
    scale: 0.5

  - from: mix
    output: out
    to: out
    input: left

  - from: mix
    output: out
    to: out
    input: right
