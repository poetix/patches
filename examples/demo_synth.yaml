# demo_synth.yaml вҖ” 16-step minor-pentatonic phrase at 130 BPM
#
# Signal flow:
#
#   clock в”Җв”Җquaverв”Җв”ҖвҶ’ seq в”Җв”Җpitchв”Җв”ҖвҶ’ glide в”Җв”Җoutв”Җв”ҖвҶ’ sq  в”Җв”Җsquareв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#                      в”Ӯ                    в””в”Җв”ҖвҶ’ tune_saw в”Җв”Җoutв”Җв”ҖвҶ’ saw в”Җв”Җsawв”Җв”Җв”Җв”Ө mix (0.3/0.5/0.2)
#                      в”Ӯ                    в””в”Җв”ҖвҶ’ tune_sub в”Җв”Җoutв”Җв”ҖвҶ’ sub в”Җв”Җsineв”Җв”Җв”ҳ
#                      в”Ӯ
#                      в”ңв”Җв”Җtriggerв”Җв”ҖвҶ’ env        lfo в”Җв”Җtriangleв”Җв”ҖвҶ’ sq.pulse_width (scale 0.2)
#                      в”ңв”Җв”Җgateв”Җв”Җв”Җв”ҖвҶ’ env
#                      в”ңв”Җв”Җtriggerв”Җв”ҖвҶ’ filter_env
#                      в””в”Җв”Җgateв”Җв”Җв”Җв”ҖвҶ’ filter_env
#
#   mix в”Җв”Җoutв”Җв”ҖвҶ’ filter в”Җв”Җoutв”Җв”ҖвҶ’ vca в”Җв”Җoutв”Җв”ҖвҶ’ final_mix.in/0
#                                                              в””в”Җв”ҖвҶ’ out.left / out.right
#   glide.out в”Җв”ҖвҶ’ cutoff_mix.in/0  (V/oct pitch tracking)        вҶ‘
#   lfo.random в”Җв”ҖвҶ’ cutoff_mix.in/1  (slow LFO sweep, scale 0.5)  в”Ӯ
#   cutoff_mix в”Җв”Җoutв”Җв”ҖвҶ’ filter.cutoff_cv                          в”Ӯ
#   filter_env в”Җв”Җoutв”Җв”ҖвҶ’ filter.resonance_cv  (scale 0.5)          в”Ӯ
#   env в”Җв”ҖвҶ’ vca.cv                                                в”Ӯ
#                                                                  в”Ӯ
#   clock в”Җв”Җbeatв”Җв”ҖвҶ’ kick_env в”Җв”Җoutв”Җв”ҖвҶ’ kick_vca в”Җв”Җoutв”Җв”ҖвҶ’ final_mix.in/1
#                                         вҶ‘
#   kick_osc в”Җв”Җsineв”Җв”ҖвҶ’ kick_vca.in
#   lfo.saw_down в”Җв”ҖвҶ’ kick_osc.voct (scale 0.3, pitch drop on each LFO cycle)
#
# tune_saw: +7 semitones (perfect 5th) + 12 cents detune above sq
# tune_sub: -1 octave below sq
#
# Hot-reload tips:
#   - Change bpm to speed up or slow down the pattern.
#   - Edit the steps list to try different melodies ("-" = rest, "_" = hold/tie).
#   - Adjust lfo.rate (Hz) to change the pulse-width and filter sweep speed.
#   - Adjust tune_saw.cent to widen or narrow the detune on the sawtooth.
#   - Raise filter.resonance for a more aggressive character.
#   - Adjust kick_env.decay to tighten or lengthen the kick.

nodes:
  clock:
    module: Clock
    params:
      bpm: 80.0
      beats_per_bar: 4
      quavers_per_beat: 2

  seq:
    module: Seq
    length: 16
    params:
      steps:
        - C2
        - B2
        - C3
        - C2
        - B2
        - Ab2
        - C2
        - Ab2
        - C2
        - G2
        - Ab2
        - C2
        - G2
        - E2
        - "_"
        - E2

  glide:
    module: Glide
    params:
      glide_ms: 50.0

  lfo:
    module: Lfo
    params:
      rate: 3.0

  tune_saw:
    module: Tuner
    params:
      octave: 1
      semi: 7
      cent: 12

  tune_sub:
    module: Tuner
    params:
      octave: -1
      semi: 0
      cent: 0

  saw:
    module: Osc

  sq:
    module: Osc

  sub:
    module: Osc

  mix:
    module: Sum
    channels: 3

  cutoff_mix:
    module: Sum
    channels: 2

  env:
    module: Adsr
    params:
      attack: 0.01
      decay: 0.06
      sustain: 0.35
      release: 0.18

  filter:
    module: Filter
    params:
      cutoff: 800.0
      resonance: 0.0
      saturate: true

  vca:
    module: Vca

  kick_osc:
    module: Osc
    params:
      frequency: 80.0

  kick_env:
    module: Adsr
    params:
      attack: 0.002
      decay: 0.12
      sustain: 0.0
      release: 0.08

  kick_vca:
    module: Vca

  final_mix:
    module: Sum
    channels: 2

  out:
    module: AudioOut

cables:
  - from: clock
    output: semiquaver
    to: seq
    input: clock

  - from: seq
    output: pitch
    to: glide
    input: in

  # sq tracks glide directly (root pitch)
  - from: glide
    output: out
    to: sq
    input: voct

  # saw tuned a detuned perfect 5th above sq
  - from: glide
    output: out
    to: tune_saw
    input: in

  - from: tune_saw
    output: out
    to: saw
    input: voct

  # sub tuned an octave below sq
  - from: glide
    output: out
    to: tune_sub
    input: in

  - from: tune_sub
    output: out
    to: sub
    input: voct

  - from: seq
    output: trigger
    to: env
    input: trigger

  - from: seq
    output: gate
    to: env
    input: gate

  # LFO modulation
  - from: lfo
    output: triangle
    to: sq
    input: pulse_width
    scale: 0.2

  # Oscillator mix (sawtooth 5th + square root + sine sub)
  - from: saw
    output: sawtooth
    to: mix
    input: in
    scale: 0.3

  - from: sq
    output: square
    to: mix
    input: in/1
    scale: 0.5

  - from: sub
    output: sine
    to: mix
    input: in/2
    scale: 0.6

  # Filter routing
  - from: mix
    output: out
    to: filter
    input: in

  - from: glide
    output: out
    to: cutoff_mix
    input: in/0

  - from: lfo
    output: sine
    to: cutoff_mix
    input: in/1
    scale: 0.5

  - from: cutoff_mix
    output: out
    to: filter
    input: cutoff_cv

  - from: filter
    output: out
    to: vca
    input: in

  - from: env
    output: out
    to: vca
    input: cv

  - from: vca
    output: out
    to: final_mix
    input: in/0
    scale: 0.3

  # Kick drum вҖ” triggered on every beat, pitch-dropped by lfo.saw_down
  - from: clock
    output: beat
    to: kick_env
    input: trigger

  - from: clock
    output: beat
    to: lfo
    input: sync

  - from: clock
    output: beat
    to: kick_env
    input: gate

  - from: lfo
    output: saw_down
    to: kick_osc
    input: voct
    scale: 0.3

  - from: kick_osc
    output: sine
    to: kick_vca
    input: in

  - from: kick_env
    output: out
    to: kick_vca
    input: cv

  - from: kick_vca
    output: out
    to: final_mix
    input: in/1
    scale: 0.7

  - from: final_mix
    output: out
    to: out
    input: left

  - from: final_mix
    output: out
    to: out
    input: right
