# demo_synth.yaml вҖ” 16-step minor-pentatonic phrase at 130 BPM
#
# Signal flow:
#
#   clock в”Җв”Җquaverв”Җв”ҖвҶ’ seq в”Җв”Җpitchв”Җв”ҖвҶ’ glide в”Җв”Җoutв”Җв”ҖвҶ’ sq  в”Җв”Җsquareв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
#                      в”Ӯ                    в””в”Җв”ҖвҶ’ tune_saw в”Җв”Җoutв”Җв”ҖвҶ’ saw в”Җв”Җsawв”Җв”Җв”Җв”Ө mix (0.3/0.5/0.2)
#                      в”Ӯ                    в””в”Җв”ҖвҶ’ tune_sub в”Җв”Җoutв”Җв”ҖвҶ’ sub в”Җв”Җsineв”Җв”Җв”ҳ
#                      в”Ӯ
#                      в”ңв”Җв”Җtriggerв”Җв”ҖвҶ’ env        lfo в”Җв”Җtriangleв”Җв”ҖвҶ’ sq.pulse_width (scale 0.4)
#                      в”ңв”Җв”Җgateв”Җв”Җв”Җв”ҖвҶ’ env
#                      в”ңв”Җв”Җtriggerв”Җв”ҖвҶ’ filter_env
#                      в””в”Җв”Җgateв”Җв”Җв”Җв”ҖвҶ’ filter_env
#
#   mix в”Җв”Җoutв”Җв”ҖвҶ’ filter в”Җв”Җoutв”Җв”ҖвҶ’ vca в”Җв”Җoutв”Җв”ҖвҶ’ out.left / out.right
#
#   glide.out в”Җв”ҖвҶ’ cutoff_mix.in/0  (V/oct pitch tracking)
#   lfo.saw_up в”Җв”ҖвҶ’ cutoff_mix.in/1  (slow LFO sweep, scale 0.5)
#   cutoff_mix в”Җв”Җoutв”Җв”ҖвҶ’ filter.cutoff_cv
#   filter_env в”Җв”Җoutв”Җв”ҖвҶ’ filter.resonance_cv  (scale 0.5)
#   env в”Җв”ҖвҶ’ vca.cv
#
# tune_saw: +7 semitones (perfect 5th) + 12 cents detune above sq
# tune_sub: -1 octave below sq
#
# Hot-reload tips:
#   - Change bpm to speed up or slow down the pattern.
#   - Edit the steps list to try different melodies ("-" = rest, "_" = hold/tie).
#   - Adjust lfo.rate (Hz) to change the pulse-width and filter sweep speed.
#   - Adjust tune_saw.cent to widen or narrow the detune on the sawtooth.
#   - Raise filter.resonance for a more aggressive character.

nodes:
  clock:
    module: ClockSequencer
    params:
      bpm: 110.0
      beats_per_bar: 4
      quavers_per_beat: 2

  seq:
    module: StepSequencer
    length: 16
    params:
      steps:
        - C4
        - "_"
        - B3
        - G3
        - A3
        - "_"
        - E3
        - "-"
        - "-"
        - C4
        - B3
        - G3
        - A3
        - "_"
        - E3
        - "-"

  glide:
    module: Glide
    params:
      glide_ms: 50.0

  lfo:
    module: Lfo
    params:
      rate: 0.3

  tune_saw:
    module: Tuner
    params:
      octave: 1
      semi: 7
      cent: 12

  tune_sub:
    module: Tuner
    params:
      octave: -1
      semi: 0
      cent: 0

  saw:
    module: Oscillator

  sq:
    module: Oscillator

  sub:
    module: Oscillator

  mix:
    module: Sum
    channels: 3

  cutoff_mix:
    module: Sum
    channels: 2

  env:
    module: AdsrEnvelope
    params:
      attack: 0.01
      decay: 0.06
      sustain: 0.35
      release: 0.18

  filter_env:
    module: AdsrEnvelope
    params:
      attack: 0.1
      decay: 0.12
      sustain: 0.8
      release: 0.25

  filter:
    module: ResonantLowpass
    params:
      cutoff: 800.0
      resonance: 0.0
      saturate: true

  vca:
    module: Vca

  out:
    module: AudioOut

cables:
  - from: clock
    output: quaver
    to: seq
    input: clock

  - from: seq
    output: pitch
    to: glide
    input: in

  # sq tracks glide directly (root pitch)
  - from: glide
    output: out
    to: sq
    input: voct

  # saw tuned a detuned perfect 5th above sq
  - from: glide
    output: out
    to: tune_saw
    input: in

  - from: tune_saw
    output: out
    to: saw
    input: voct

  # sub tuned an octave below sq
  - from: glide
    output: out
    to: tune_sub
    input: in

  - from: tune_sub
    output: out
    to: sub
    input: voct

  - from: seq
    output: trigger
    to: env
    input: trigger

  - from: seq
    output: gate
    to: env
    input: gate

  - from: seq
    output: trigger
    to: filter_env
    input: trigger

  - from: seq
    output: gate
    to: filter_env
    input: gate

  # LFO modulation
  - from: lfo
    output: triangle
    to: sq
    input: pulse_width
    scale: 0.4

  # Oscillator mix (sawtooth 5th + square root + sine sub)
  - from: saw
    output: sawtooth
    to: mix
    input: in
    scale: 0.3

  - from: sq
    output: square
    to: mix
    input: in/1
    scale: 0.5

  - from: sub
    output: sine
    to: mix
    input: in/2
    scale: 0.6

  # Filter routing
  - from: mix
    output: out
    to: filter
    input: in

  - from: glide
    output: out
    to: cutoff_mix
    input: in/0

  - from: lfo
    output: saw_up
    to: cutoff_mix
    input: in/1
    scale: 0.5

  - from: cutoff_mix
    output: out
    to: filter
    input: cutoff_cv

  - from: filter_env
    output: out
    to: filter
    input: resonance_cv
    scale: 0.8

  - from: filter
    output: out
    to: vca
    input: in

  - from: env
    output: out
    to: vca
    input: cv

  - from: vca
    output: out
    to: out
    input: left

  - from: vca
    output: out
    to: out
    input: right
