# demo_synth.yaml — 16-step minor-pentatonic phrase at 120 BPM
#
# Signal flow:
#
#   clock ──semiquaver──→ seq ──pitch──→ glide ──out──→ saw ──sawtooth──┐
#                          │                    └──────→ sq  ──square───┤ scale 0.3/0.5/0.2
#                          ├──trigger──→ env         lfo ──sine──→ sq.pulse_width
#                          └──gate────→ env ──out──→ vca.cv
#                                               mix ──out──→ vca ──out──→ out.left
#                                                                    └──→ out.right
#
# Hot-reload tips:
#   - Change bpm to speed up or slow down the pattern.
#   - Edit the steps list to try different melodies ("-" = rest, "_" = hold/tie).
#   - Adjust attack/decay/sustain/release for a different envelope shape.
#   - Change glide_ms to add or remove portamento between notes.

nodes:
  clock:
    module: ClockSequencer
    params:
      bpm: 130.0
      beats_per_bar: 4
      quavers_per_beat: 2

  seq:
    module: StepSequencer
    length: 16
    params:
      steps:
        - C4
        - "_"
        - B3
        - G3
        - A3
        - "_"
        - E3
        - "-"
        - "-"
        - C4
        - B3
        - "G3"
        - "A3"
        - "_"
        - "E3"
        - "-"

  glide:
    module: Glide
    params:
      glide_ms: 50.0

  lfo:
    module: Oscillator
    params:
      frequency: 0.4

  lfo2:
    module: Oscillator
    params:
      frequency: 0.1

  saw:
    module: Oscillator
    frequency: 1.0


  sq:
    module: Oscillator
    frequency: 1.0

  sub:
    module: Oscillator
    frequency: 1.0

  mix:
    module: Sum
    channels: 3

  mix2:
    module: Sum
    channels: 2

  env:
    module: AdsrEnvelope
    params:
      attack: 0.001
      decay: 0.05
      sustain: 0.4
      release: 0.2

  filter_env:
    module: AdsrEnvelope
    params:
      attack: 0.05
      decay: 0.1
      sustain: 1.0
      release: 0.3

  filter:
    module: ResonantLowpass
    params:
      cutoff: 200.0
      resonance: 0.0

  vca:
    module: Vca

  out:
    module: AudioOut

cables:
  - from: clock
    output: quaver
    to: seq
    input: clock

  - from: seq
    output: pitch
    to: glide
    input: in

  - from: glide
    output: out
    to: saw
    input: voct

  - from: glide
    output: out
    to: sq
    input: voct

  - from: seq
    output: pitch
    to: sub
    input: voct

  - from: seq
    output: trigger
    to: env
    input: trigger

  - from: seq
    output: trigger
    to: filter_env
    input: trigger

  - from: seq
    output: gate
    to: env
    input: gate

  - from: lfo
    output: sine
    to: sq
    input: pulse_width
    scale: 0.8

  - from: saw
    output: sawtooth
    to: mix
    input: in
    scale: 0.3

  - from: sq
    output: square
    to: mix
    input: in/1
    scale: 0.5

  - from: sub
    output: sawtooth
    to: mix
    input: in/2
    scale: 0.2

  - from: mix
    output: out
    to: filter
    input: in

  - from: filter
    output: out
    to: vca
    input: in

  - from: glide
    output: out
    to: mix2
    input: in/0

  - from: lfo2
    output: sine
    to: mix2
    input: in/1
    scale: 1.0

  - from: mix2
    output: out
    to: filter
    input: cutoff_cv

  - from: filter_env
    output: out
    to: filter
    input: resonance_cv

  - from: env
    output: out
    to: vca
    input: cv

  - from: vca
    output: out
    to: out
    input: left

  - from: vca
    output: out
    to: out
    input: right
